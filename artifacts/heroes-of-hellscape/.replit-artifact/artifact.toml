kind = "web"
previewPath = "/"
title = "Heroes of Hellscape"
version = "1.0.0"
id = "artifacts/heroes-of-hellscape"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23554

[services.development]
run = "pnpm --filter @workspace/heroes-of-hellscape run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/heroes-of-hellscape", "run", "build" ]
publicDir = "artifacts/heroes-of-hellscape/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23554"
BASE_PATH = "/"
